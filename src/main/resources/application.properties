spring.application.name=board
# Server Configuration
server.port=8080
# --- Database Configuration (MySQL on AWS EC2) ---
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/board_db?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JPA Configuration (SQL Logging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# --- Logging Configuration ---
logging.level.org.hibernate.orm.jdbc.bind=TRACE
# H2 Console Configuration
spring.h2.console.enabled=false
# --- Actuator & Monitoring (Spring Boot 3.5+ \uCD5C\uC2E0 \uC124\uC815) ---
# 1. \uBAA8\uB4E0 \uC5D4\uB4DC\uD3EC\uC778\uD2B8 \uB178\uCD9C (\uAE30\uC874\uACFC \uB3D9\uC77C)
management.endpoints.web.exposure.include=*
# 2. Prometheus \uC5D4\uB4DC\uD3EC\uC778\uD2B8 \uD65C\uC131\uD654 (\uACBD\uACE0 \uD574\uACB0: access \uD0A4 \uC0AC\uC6A9)
# \uAE30\uC874: management.endpoint.prometheus.enabled=true
management.endpoint.prometheus.access=unrestricted
# 3. Prometheus \uC9C0\uD45C \uC218\uCD9C \uD65C\uC131\uD654 (\uACBD\uACE0 \uD574\uACB0: \uACBD\uB85C \uBCC0\uACBD)
# \uAE30\uC874: management.metrics.export.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true